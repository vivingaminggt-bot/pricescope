services:
  - type: web
    name: pricescope
    runtime: static
    staticPublishPath: .
    buildCommand: ""
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /css/*
        name: Cache-Control
        value: max-age=86400
      - path: /js/*
        name: Cache-Control
        value: max-age=86400
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
